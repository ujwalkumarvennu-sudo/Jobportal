databases:
  - name: job-portal-db
    databaseName: job_portal
    user: job_portal_user
    plan: free

services:
  - type: web
    name: job-portal-web
    env: python
    buildCommand: "pip install -r requirements.txt && python -c \"from main import app, db; app.app_context().push(); db.create_all()\""
    startCommand: "gunicorn main:app"
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: job-portal-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.10.0
    disk:
      name: uploads
      mountPath: /opt/render/project/src/static/resumes
      sizeGB: 1
