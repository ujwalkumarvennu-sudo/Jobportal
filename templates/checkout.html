{% extends 'layout.html' %}

{% block content %}
<div style="max-width: 500px; margin: 0 auto; padding: 2rem 0;">
    <h2 class="page-title" style="text-align: center;">Boost Your Job Post</h2>
    <p class="page-desc" style="text-align: center; margin-bottom: 2rem;">Reach 10x more candidates by featuring your listing.</p>

    <div class="card" style="border: 2px solid var(--primary); box-shadow: 0 10px 25px rgba(79, 70, 229, 0.15);">
        <div style="text-align: center; margin-bottom: 2rem;">
            <div style="font-size: 1.2rem; font-weight: 600; color: var(--text-main);">{{ job.title }}</div>
            <div style="color: var(--text-muted); font-size: 0.95rem;">Premium Placement • 7 Days</div>
            <div style="font-size: 2.5rem; font-weight: 800; color: var(--text-main); margin-top: 1rem;">$29<span style="font-size: 1rem; color: var(--text-muted); font-weight: normal;">.99</span></div>
        </div>

        <form method="POST" id="payment-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div style="margin-bottom: 1.5rem;">
                <label style="display: block; font-size: 0.9rem; font-weight: 600; margin-bottom: 0.5rem; color: var(--text-main);">Card Details (Mock UI)</label>
                <div style="padding: 1rem; border: 1px solid var(--border-color); border-radius: 8px; background: var(--bg-color); display: flex; flex-direction: column; gap: 1rem;">
                    <input type="text" placeholder="Card Number (e.g. 4242 4242 4242 4242)" class="form-control" required style="width: 100%; border: none; background: transparent; padding: 0.5rem 0;" />
                    <div style="display: flex; gap: 1rem;">
                        <input type="text" placeholder="MM/YY" class="form-control" required style="width: 100%; border: none; background: transparent; padding: 0.5rem 0;" />
                        <input type="text" placeholder="CVC" class="form-control" required style="width: 100%; border: none; background: transparent; padding: 0.5rem 0;" />
                    </div>
                </div>
                <div style="font-size: 0.8rem; color: var(--text-muted); margin-top: 0.5rem; display: flex; align-items: center; gap: 5px;">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    Payments are secure and encrypted. (This is a mock sandbox).
                </div>
            </div>

            <button type="submit" id="submit-btn" class="btn" style="width: 100%; font-size: 1.1rem; padding: 1rem; border-radius: 8px; display: flex; justify-content: center; align-items: center; gap: 10px;">
                <span>Pay $29.99</span>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
            </button>
        </form>
    </div>
</div>

<script>
    document.getElementById('payment-form').addEventListener('submit', function(e) {
        const btn = document.getElementById('submit-btn');
        btn.innerHTML = '<span style="animation: pulse 1s infinite;">Processing...</span>';
        btn.style.opacity = '0.8';
        btn.disabled = true;
    });
</script>
{% endblock %}
