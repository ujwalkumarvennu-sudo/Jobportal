{% extends 'layout.html' %}

{% block content %}
<div style="margin-bottom: 2rem;">
    <h2 class="page-title">Admin Dashboard</h2>
    <p class="page-desc">Overview of platform metrics and usage.</p>
</div>

<div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; margin-bottom: 3rem;">
    <div class="card" style="text-align: center; border-bottom: 4px solid var(--primary);">
        <div style="font-size: 3rem; font-weight: 800; color: var(--primary); margin-bottom: 0.5rem;">{{ u_count }}</div>
        <div style="color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 1px;">Total Users</div>
    </div>
    
    <div class="card" style="text-align: center; border-bottom: 4px solid var(--success);">
        <div style="font-size: 3rem; font-weight: 800; color: var(--success); margin-bottom: 0.5rem;">{{ j_count }}</div>
        <div style="color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 1px;">Active Jobs</div>
    </div>
    
    <div class="card" style="text-align: center; border-bottom: 4px solid var(--warning);">
        <div style="font-size: 3rem; font-weight: 800; color: var(--warning); margin-bottom: 0.5rem;">{{ a_count }}</div>
        <div style="color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 1px;">Applications</div>
    </div>
</div>

<div class="card">
    <h3 style="margin-bottom: 1.5rem;">Platform Activity</h3>
    <canvas id="activityChart" height="100" data-u="{{ u_count }}" data-j="{{ j_count }}" data-a="{{ a_count }}"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    const canvas = document.getElementById('activityChart');
    const uCount = parseInt(canvas.getAttribute('data-u'), 10);
    const jCount = parseInt(canvas.getAttribute('data-j'), 10);
    const aCount = parseInt(canvas.getAttribute('data-a'), 10);

    const ctx = canvas.getContext('2d');
    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['Users', 'Jobs', 'Applications'],
            datasets: [{
                label: 'Platform Metrics',
                data: [uCount, jCount, aCount],
                backgroundColor: [
                    'rgba(79, 70, 229, 0.5)',
                    'rgba(16, 185, 129, 0.5)',
                    'rgba(245, 158, 11, 0.5)'
                ],
                borderColor: [
                    'rgba(79, 70, 229, 1)',
                    'rgba(16, 185, 129, 1)',
                    'rgba(245, 158, 11, 1)'
                ],
                borderWidth: 2,
                borderRadius: 4
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });
</script>
{% endblock %}
