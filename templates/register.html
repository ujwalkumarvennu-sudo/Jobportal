{% extends 'layout.html' %}

{% block content %}
<div style="max-width: 450px; margin: 2rem auto;">
    <h2 class="page-title" style="text-align: center;">Create an Account</h2>
    <p class="page-desc" style="text-align: center;">Register to start posting jobs.</p>

    <div class="card" style="padding: 2.5rem;">
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            
            <div class="form-group">
                <label>I am a...</label>
                <select name="role" class="form-control" style="cursor: pointer;">
                    <option value="seeker">Job Seeker</option>
                    <option value="employer">Employer</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" class="form-control" required autofocus>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" class="form-control" required>
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            
            <button type="submit" class="btn" style="width: 100%; padding: 1rem; font-size: 1.05rem; margin-top: 1rem;">Register</button>
        </form>
        <div style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-muted);">
            Already have an account? <a href="{{ url_for('login') }}" style="color: var(--primary); font-weight: 600; text-decoration: none;">Log In</a>
        </div>
    </div>
</div>
{% endblock %}
