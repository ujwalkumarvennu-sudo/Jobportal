{% extends 'layout.html' %}

{% block content %}
<div style="max-width: 450px; margin: 2rem auto;">
    <h2 class="page-title" style="text-align: center;">Welcome Back</h2>
    <p class="page-desc" style="text-align: center;">Log in to your dashboard.</p>

    <div class="card" style="padding: 2.5rem;">
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" class="form-control" required autofocus>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>

            <button type="submit" class="btn"
                style="width: 100%; padding: 1rem; font-size: 1.05rem; margin-top: 1rem;">Log In</button>
        </form>
        <div style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-muted);">
            Don't have an account? <a href="{{ url_for('register') }}"
                style="color: var(--primary); font-weight: 600; text-decoration: none;">Sign Up</a>
        </div>
    </div>
</div>
{% endblock %}
